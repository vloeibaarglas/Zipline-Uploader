name: Build & Release APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore ${{ github.workspace }}/release.keystore \
            -alias zipline \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass zipline123 \
            -keypass zipline123 \
            -dname "CN=Zipline, OU=Upload, O=Zipline, L=Unknown, ST=Unknown, C=US"

      - name: Build Signed Release APK
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/release.keystore
          KEYSTORE_PASSWORD: zipline123
          KEY_ALIAS: zipline
          KEY_PASSWORD: zipline123
        run: ./gradlew assembleRelease

      - name: Upload Release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: zipline-upload-release
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.version }}
          body: |
            ## Zipline Upload ${{ github.event.inputs.version }}

            ### Changes
            - See commit history for details

            ### Installation
            1. Download the APK below
            2. Enable "Install from unknown sources" on your device
            3. Open the APK to install
          files: app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
